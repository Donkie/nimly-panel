# Local development / self-test stack. For production on Dokploy, deploy the
# Dockerfile as an "Application" instead (see README) and point MQTT_BROKER_URL
# at your real broker.
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - data:/data
    restart: unless-stopped
    depends_on:
      - mosquitto

  # Test broker — NOT for production. Allows anonymous connections so you can
  # exercise the panel without your real Zigbee network.
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./deploy/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    restart: unless-stopped

volumes:
  data:
